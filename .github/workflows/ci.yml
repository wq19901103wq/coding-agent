name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  pull_request_review:
    types: [submitted]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # CI runs on GitHub-hosted runners (outside China); use the official
      # PyPI instead of the Tsinghua mirror that the local default assumes.
      SWE_BENCH_PIP_INDEX_URL: https://pypi.org/simple
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check formatting
        run: ruff format --check

      - name: Run linter
        run: ruff check

      - name: Run type check
        run: mypy agent tests

      - name: Run tests
        run: python -m pytest -q

  e2e:
    runs-on: ubuntu-latest
    needs: test
    env:
      SWE_BENCH_PIP_INDEX_URL: https://pypi.org/simple
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run end-to-end tests
        run: python scripts/run_e2e.py
