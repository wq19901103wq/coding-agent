  Your command ran successfully and did not produce any output.
  (Open file: {open_file})
  (Current directory: {working_dir})
  bash-$
state_command:
  name: |
    CURRENT_FILE="$CURRENT_FILE" python3 -c "import json, os; cf = os.environ.get('CURRENT_FILE', ''); wd = os.getcwd(); print(json.dumps({'open_file': os.path.realpath(cf) if cf else 'n/a', 'working_dir': wd}))"
  code: |
    # state 命令直接内联执行，不依赖 bash 函数定义，避免 bash 被污染后 state 丢失。
parse_function: ThoughtActionParser
env_variables:
  WINDOW: 100
  OVERLAP: 2
  CURRENT_LINE: 0
  CURRENT_FILE: ""
  SEARCH_RESULTS: ()
  SEARCH_FILES: ()
  SEARCH_INDEX: 0
command_files:
- defaults.sh
- search.sh
- edit_linting.sh
- _split_string.py
- submit.sh
parse_command: ParseCommandDetailed
history_processor: Last5Observations
